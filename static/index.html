<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GymReserve - Premium Sport Booking</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <header>
            <h1>Gym<span>Reserve</span></h1>
            <p>Réservez votre séance de sport en un clic</p>
        </header>

        <main>
            <section class="booking-card">
                <h2>Nouvelle Réservation</h2>
                <div class="form-group">
                    <label for="adherent">Adhérent</label>
                    <select id="adherent"></select>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="salle">Salle</label>
                        <select id="salle"></select>
                    </div>
                    <div class="form-group">
                        <label for="sport">Sport</label>
                        <select id="sport"></select>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" value="2026-04-15">
                    </div>
                    <div class="form-group">
                        <label for="schedule">Horaire</label>
                        <select id="schedule">
                            <option value="09:00-10:00">09:00 - 10:00</option>
                            <option value="10:00-11:00">10:00 - 11:00</option>
                            <option value="11:00-12:00">11:00 - 12:00</option>
                            <option value="14:00-15:00">14:00 - 15:00</option>
                            <option value="15:00-16:00">15:00 - 16:00</option>
                            <option value="18:00-19:00">18:00 - 19:00</option>
                        </select>
                    </div>
                </div>
                <button id="btn-reserve" class="btn-primary">Confirmer la Réservation</button>
                <div id="status-message"></div>
            </section>

            <section class="list-section">
                <h2>Vos Réservations</h2>
                <div id="reservations-list" class="grid-list">
                    <!-- Dynamic content -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
